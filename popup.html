<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="popup.css" />
  <title>QuickFill</title>
</head>
<body>
  <header class="app-head">
    <div class="brand">
      <span class="bolt" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M13 2 4.5 13.2H10l-1.2 8.8L19 9.4h-5.4L13 2Z" fill="currentColor"/></svg>
      </span>
      <span class="brand-name">QuickFill</span>
    </div>
    <nav class="tabs" role="tablist">
      <button id="tab-fill" class="tab is-active" role="tab">Fill</button>
      <button id="tab-profiles" class="tab" role="tab">Profiles</button>
    </nav>
  </header>

  <main>
    <!-- FILL VIEW -->
    <section id="view-fill" class="view">
      <label class="field-label" for="active-select">Active profile</label>
      <div class="select-wrap">
        <select id="active-select"></select>
      </div>

      <button id="fill-btn" class="btn btn-primary">Fill this page</button>

      <label class="checkrow">
        <input type="checkbox" id="only-empty" />
        <span>Only fill fields that are empty</span>
      </label>

      <p id="status" class="status" role="status"></p>

      <p class="hint">Tip: you can also press <kbd>Alt</kbd>+<kbd>Shift</kbd>+<kbd>F</kbd> on any page.</p>
    </section>

    <!-- PROFILES VIEW -->
    <section id="view-profiles" class="view hidden">
      <div id="profile-list" class="profile-list"></div>
      <button id="add-profile" class="btn btn-ghost">+ Add profile</button>

      <div class="io-row">
        <button id="export-btn" class="btn btn-ghost btn-sm">Export</button>
        <button id="import-btn" class="btn btn-ghost btn-sm">Import</button>
        <input id="import-file" type="file" accept="application/json,.json" hidden />
      </div>
      <p id="io-status" class="status" role="status"></p>

      <div id="editor" class="editor hidden"></div>
    </section>
  </main>

  <script src="store.js"></script>
  <script src="filler.js"></script>
  <script src="popup.js"></script>
</body>
</html>
